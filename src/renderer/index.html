<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PresenceKeeper</title>
  <link rel="stylesheet" href="tailwind.css" />
</head>
<body class="selection:bg-brandSky/40">
  <main class="mx-auto max-w-6xl px-4 pb-8 pt-8 md:px-8">
    <header class="mb-6">
      <div class="inline-flex items-center gap-2 rounded-full border border-brandSky/40 bg-brandSky/10 px-3 py-1 text-xs tracking-[0.18em] text-brandSky">PRESENCEKEEPER</div>
      <h1 class="mt-3 text-4xl font-semibold tracking-tight text-white md:text-5xl">Control Center</h1>
      <p class="mt-2 text-slate-300">Modern desktop activity scheduler for Windows</p>
    </header>

    <div class="grid gap-4 lg:grid-cols-3">
      <section class="glass-card p-5 lg:col-span-2">
        <div class="flex flex-wrap items-end justify-between gap-3">
          <div>
            <h2 class="text-lg font-semibold">Runtime</h2>
            <p class="text-sm text-slate-400">Manual start/stop with live countdown</p>
          </div>
          <div class="rounded-xl border border-line bg-panelSoft px-3 py-2">
            <div class="text-xs uppercase tracking-wide text-slate-400">Status</div>
            <div class="mt-1 flex items-center gap-2">
              <span id="statusDot" class="h-2.5 w-2.5 rounded-full bg-slate-500"></span>
              <strong id="status" class="text-sm">Stopped</strong>
            </div>
          </div>
        </div>

        <div class="mt-5 grid gap-4 md:grid-cols-[1fr_auto] md:items-end">
          <label class="block">
            <span class="mb-1 block text-sm text-slate-300">Interval (seconds)</span>
            <input id="interval" class="input-modern w-full md:w-56" type="number" min="30" max="900" value="240" />
          </label>
          <div class="rounded-xl border border-line bg-panelSoft px-4 py-3 text-right">
            <div class="text-xs uppercase tracking-wide text-slate-400">Next tick</div>
            <div id="countdown" class="mt-1 text-2xl font-semibold text-brandSky">-</div>
          </div>
        </div>

        <div class="mt-6 flex flex-wrap items-center gap-4">
          <button id="startBtn" class="orb-start">START</button>
          <button id="stopBtn" class="orb-stop">STOP</button>
          <p class="text-sm text-slate-400">Round controls with instant response and schedule fallback.</p>
        </div>
      </section>

      <section class="glass-card p-5">
        <h2 class="text-lg font-semibold">Daily Schedule</h2>
        <p class="text-sm text-slate-400">Automatic runtime window</p>
        <label class="mt-4 flex cursor-pointer items-center gap-2 text-sm">
          <input id="scheduleEnabled" type="checkbox" class="h-4 w-4 rounded border-line bg-panelSoft" />
          Enable schedule
        </label>
        <div class="mt-4 space-y-3">
          <label class="block">
            <span class="mb-1 block text-sm text-slate-300">Start time</span>
            <input id="startTime" class="input-modern w-full" type="time" value="08:30" />
          </label>
          <label class="block">
            <span class="mb-1 block text-sm text-slate-300">Stop time</span>
            <input id="stopTime" class="input-modern w-full" type="time" value="17:30" />
          </label>
        </div>
        <button id="saveScheduleBtn" class="mt-4 w-full rounded-xl border border-brandSky/40 bg-brandSky/20 px-3 py-2 text-sm font-semibold text-brandSky transition hover:bg-brandSky/30">Save Schedule</button>
      </section>
    </div>

    <section class="glass-card mt-4 p-5">
      <div class="mb-3 flex items-center justify-between gap-2">
        <h2 class="text-lg font-semibold">Event Log</h2>
        <span class="text-xs uppercase tracking-wide text-slate-400">Session Output</span>
      </div>
      <pre id="log" class="max-h-64 min-h-44 overflow-auto rounded-xl border border-line bg-slate-950/90 p-3 text-xs text-brandSky"></pre>
    </section>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
