name: Bug report
description: Report a reproducible problem in PresenceKeeper
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please provide clear, reproducible details.
  - type: input
    id: app_version
    attributes:
      label: App version
      description: Example: 0.3.0
      placeholder: "0.3.0"
    validations:
      required: true
  - type: input
    id: windows_version
    attributes:
      label: Windows version
      description: Example: Windows 11 24H2
      placeholder: "Windows 11 ..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps in order
      placeholder: |
        1. Open app
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant log lines from the app or add screenshots
      render: shell
    validations:
      required: false
